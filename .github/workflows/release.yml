name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # --- Triggered by manual dispatch: compute version, build, create draft ---
  compute-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute new version
        id: bump
        shell: bash
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "::notice::Version bump: $CURRENT → $NEW (${{ inputs.bump }})"

  build:
    if: github.event_name == 'workflow_dispatch'
    needs: compute-version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
    secrets: inherit

  draft-release:
    if: github.event_name == 'workflow_dispatch'
    needs: [compute-version, build]
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: udp-forwarder-v*

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.version }}
          name: UDP Forwarder v${{ needs.compute-version.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: true

  # --- Triggered when draft is published: commit version bump + tag ---
  finalize:
    if: github.event_name == 'release'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update version in Cargo.toml
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          sed -i "s/^version = \"$CURRENT\"/version = \"$VERSION\"/" Cargo.toml

      - name: Commit version bump
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to $VERSION"
          git push
