name: Build UDP Forwarder

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: blacksmith-2vcpu-windows-2022
            artifact: udp-forwarder.exe
          - target: x86_64-unknown-linux-gnu
            runner: blacksmith-2vcpu-ubuntu-2204
            artifact: udp-forwarder
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: udp-forwarder

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: contains(matrix.target, 'linux')
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign macOS binary
        if: matrix.target == 'aarch64-apple-darwin'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Sign the binary
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          codesign --force --options runtime --sign "Developer ID Application: ${APPLE_TEAM_ID}" "$BINARY"
          codesign --verify --verbose "$BINARY"

          # Notarize
          zip -j notarize.zip "$BINARY"
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait
          rm notarize.zip

      - name: Clean up signing credentials
        if: matrix.target == 'aarch64-apple-darwin' && always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Package
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cp config.ini.example staging/config.ini
          cd staging
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}.zip .
          else
            zip ../udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}.zip *
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: udp-forwarder-v*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: UDP Forwarder v${{ steps.version.outputs.version }}
          files: artifacts/**/*.zip
          generate_release_notes: true
