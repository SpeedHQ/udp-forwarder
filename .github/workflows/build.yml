name: Build UDP Forwarder

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: blacksmith-2vcpu-windows-2022
            artifact: udp-forwarder.exe
          - target: x86_64-unknown-linux-gnu
            runner: blacksmith-2vcpu-ubuntu-2204
            artifact: udp-forwarder
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: udp-forwarder

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: contains(matrix.target, 'linux')
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # --- macOS: build .app bundle + signed .dmg ---
      - name: Import Apple certificate
        if: matrix.target == 'aarch64-apple-darwin'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Package macOS .app and .dmg
        if: matrix.target == 'aarch64-apple-darwin'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          APP_DIR="target/UDP Forwarder.app"

          # Find generated app icon
          ICON_PNG=$(find target/${{ matrix.target }}/release/build/udp-forwarder-*/out -name "app_icon.png" -print -quit)

          # Create .icns
          ICONSET_DIR=$(mktemp -d)/AppIcon.iconset
          mkdir -p "$ICONSET_DIR"
          sips -z 16 16     "$ICON_PNG" --out "$ICONSET_DIR/icon_16x16.png"      > /dev/null
          sips -z 32 32     "$ICON_PNG" --out "$ICONSET_DIR/icon_16x16@2x.png"   > /dev/null
          sips -z 32 32     "$ICON_PNG" --out "$ICONSET_DIR/icon_32x32.png"      > /dev/null
          sips -z 64 64     "$ICON_PNG" --out "$ICONSET_DIR/icon_32x32@2x.png"   > /dev/null
          sips -z 128 128   "$ICON_PNG" --out "$ICONSET_DIR/icon_128x128.png"    > /dev/null
          sips -z 256 256   "$ICON_PNG" --out "$ICONSET_DIR/icon_128x128@2x.png" > /dev/null
          sips -z 256 256   "$ICON_PNG" --out "$ICONSET_DIR/icon_256x256.png"    > /dev/null
          iconutil -c icns "$ICONSET_DIR" -o target/AppIcon.icns
          rm -rf "$(dirname "$ICONSET_DIR")"

          # Create .app bundle
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp "$BINARY" "$APP_DIR/Contents/MacOS/udp-forwarder"
          cp target/AppIcon.icns "$APP_DIR/Contents/Resources/AppIcon.icns"
          cp config.ini.example "$APP_DIR/Contents/Resources/config.ini"

          cat > "$APP_DIR/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>UDP Forwarder</string>
              <key>CFBundleDisplayName</key>
              <string>UDP Forwarder</string>
              <key>CFBundleIdentifier</key>
              <string>com.speedhq.udp-forwarder</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>udp-forwarder</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>LSUIElement</key>
              <false/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          # Sign .app bundle
          codesign --force --deep --options runtime \
              --sign "Developer ID Application: ${APPLE_TEAM_ID}" \
              "$APP_DIR"
          codesign --verify --verbose "$APP_DIR"

          # Create .dmg
          DMG_PATH="udp-forwarder-v${VERSION}-${{ matrix.target }}.dmg"
          DMG_STAGING="target/dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_DIR" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create -volname "UDP Forwarder" \
              -srcfolder "$DMG_STAGING" \
              -ov -format UDZO \
              "$DMG_PATH"
          rm -rf "$DMG_STAGING"

          # Notarize .dmg
          xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Clean up signing credentials
        if: matrix.target == 'aarch64-apple-darwin' && always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12"

      # --- Windows/Linux: zip binary + config ---
      - name: Package (Windows/Linux)
        if: matrix.target != 'aarch64-apple-darwin'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cp config.ini.example staging/config.ini
          cd staging
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            7z a ../udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}.zip .
          else
            zip ../udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}.zip *
          fi

      # Upload .dmg for macOS, .zip for others
      - uses: actions/upload-artifact@v4
        if: matrix.target == 'aarch64-apple-darwin'
        with:
          name: udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}.dmg

      - uses: actions/upload-artifact@v4
        if: matrix.target != 'aarch64-apple-darwin'
        with:
          name: udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: udp-forwarder-v${{ steps.version.outputs.version }}-${{ matrix.target }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: udp-forwarder-v*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: UDP Forwarder v${{ steps.version.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
